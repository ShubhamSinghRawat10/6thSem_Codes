<!DOCTYPE html>
<html>

<head>
    <title>Practical 5 - Screen Output, Keyboard Input & Loops</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        h2 {
            color: #555;
            margin-top: 25px;
        }

        button {
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }

        button:hover {
            background: #45a049;
        }

        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .box {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

    </style>


    <script>
        function promptInput() {
            var name = prompt("Enter your name:");
            if (name) {
                document.getElementById("inputResult").innerText = "Hello, " + name + "!";
            }
        }

        function readInput() {
            var name = document.getElementById("nameInput").value;
            if (name !== "") {
                document.getElementById("inputResult").innerText = "Hello, " + name + "!";
            } 
            else {
                document.getElementById("inputResult").innerText = "Please enter a name.";
            }
        }

        function forLoop() {
            var n = parseInt(document.getElementById("num").value) || 5;
            var text = "For Loop:\n";
            for (var i = 1; i <= 10; i++) {
                text += n + " x " + i + " = " + (i * n)+"\n";
            }
            document.getElementById("result").innerText = text;
        }

        function whileLoop() {
            var n = parseInt(document.getElementById("num").value) || 5;
            var text = "While Loop:\n";
            var i = 1;
            while (i <= n) {
                text += "Number: " + i + "\n";
                i++;
            }
            document.getElementById("result").innerText = text;
        }

        function doWhileLoop() {
            var n = parseInt(document.getElementById("num").value) || 5;
            var text = "Do-While Loop:\n";
            var i = 1;
            do {
                text += "Count: " + i + "\n";
                i++;
            } while (i <= n);
            document.getElementById("result").innerText = text;
        }
    </script>

</head>

<body>

    <h1>Practical 5: Screen Output, Keyboard Input & Loops</h1>

    <h2>1. Screen Output</h2>
    <button onclick="alert('Hello! This is an alert box.')">Alert Box</button>
    <button onclick="document.getElementById('output').innerText = 'Text displayed using innerHTML!'">innerHTML</button>
    <button
        onclick="console.log('Hello from console!'); document.getElementById('output').innerText = 'Check console (F12)'">ConsoleLog</button>
    <div class="box" id="output">Output appears here...</div>

    <h2>2. Keyboard Input</h2>
    <button onclick="promptInput()">Using prompt()</button>
    <br><br>
    <input type="text" id="nameInput" placeholder="Type your name">
    <button onclick="readInput()">Read Input</button>
    <div class="box" id="inputResult">Your input appears here...</div>

    <h2>3. Loops</h2>
    <input type="number" id="num" placeholder="Enter a number">
    <button onclick="forLoop()">For Loop</button>
    <button onclick="whileLoop()">While Loop</button>
    <button onclick="doWhileLoop()">Do-While Loop</button>
    <div class="box" id="result">Loop output appears here...</div>

</body>
<footer style="text-align: center; color: navy; font-size: 20px;">CREATED BY SHUBHAM SINGH RAWAT</footer>
</html>
