<!DOCTYPE html>
<html>
<head>
<title>CSS Box Model Diagram</title>
<style>
    body{
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.margin{
    position:relative;
    border:3px solid #333;
    padding:60px;
}

.border{
    position:relative;
    border:3px solid #555;
    padding:60px;
}

.padding{
    position:relative;
    border:3px solid #777;
    padding:60px;
}

.content{
    border:2px solid black;
    padding:10px 25px;
    text-align:center;
    font-weight:bold;
}

/* label positions */
.top{
    position:absolute;
    top:5px;
    left:50%;
    transform:translateX(-50%);
}

.bottom{
    position:absolute;
    bottom:5px;
    left:50%;
    transform:translateX(-50%);
}

.left{
    position:absolute;
    left:5px;
    top:50%;
    transform:translateY(-50%) rotate(-90deg);
}

.right{
    position:absolute;
    right:5px;
    top:50%;
    transform:translateY(-50%) rotate(90deg);
}
</style>
</head>
<body>

<div class="margin">
    <span class="top">top margin</span>
    <span class="left">left margin</span>
    <span class="right">right margin</span>
    <span class="bottom">bottom margin</span>

    <div class="border">
        <span class="top">top border</span>
        <span class="left">left border</span>
        <span class="right">right border</span>
        <span class="bottom">bottom border</span>

        <div class="padding">
            <span class="top">top padding</span>
            <span class="left">left padding</span>
            <span class="right">right padding</span>
            <span class="bottom">bottom padding</span>

            <div class="content">
                Content
            </div>

        </div>
    </div>
</div>

</body>
</html>
