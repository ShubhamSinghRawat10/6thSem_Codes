<!DOCTYPE html>
<html>
<head>
<title>CSS Box Model Diagram</title>
<style>
    body{
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.margin{
    position:relative;
    border:3px solid #333;
    background-color: aqua;
    padding:60px;
}

.border{
    position:relative;
    background-color: rgb(205, 0, 44);
    border:3px solid #555;
    padding:60px;
}

.content{
    border:2px solid black;
    padding:10px 25px;
    background-color: yellow;
    text-align:center;
    font-weight:bold;
}

/* label positions */
.top{
    position:absolute;
    top:25px;
    left:50%;
    transform:translateX(-50%);
}

.bottom{
    position:absolute;
    bottom:5px;
    left:50%;
    transform:translateX(-50%);
}

.left{
    position:absolute;
    left:5px;
    top:50%;
    transform:translateY(-50%) rotate(-90deg);
}

.right{
    position:absolute;
    right:5px;
    top:50%;
    transform:translateY(-50%) rotate(90deg);
}
</style>
</head>
<body>

<div class="margin">
    <span class="top">C</span>

    <div class="border">
        <span class="top">B</span>

            <div class="content">
                A
            </div>

        </div>
    </div>
</div>

</body>
</html>
