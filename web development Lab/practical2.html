<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout</title>
</head>
<body>

<table border="1" cellpadding="10" cellspacing="5">
    <tr>
        
        <th>C1</th>
        <th>C2</th>
        <th>C3</th>
        <th>C4</th>
        <th>C5</th>
    </tr>

    <tr>
        <th>R1</th>
        <td colspan="4">Hello</td>
    </tr>

    <tr>
        <th>R2</th>
        <td colspan="2">BTech</td>
        <td rowspan="2">6</td>
        <td rowspan="2">th</td>
    </tr>

    <tr>
        <th>R3</th>
        <td colspan="2">CSE</td>
    </tr>

    <tr>
        <th>R4</th>
        <td rowspan="2">Web</td>
        <td rowspan="2">Tech</td>
        <td colspan="2">Lab</td>
    </tr>

    <tr>
        <th>R5</th>
        <td colspan="1">5th</td>
        <td colspan="2">Floor</td>
    </tr>
</table>

</body>
</html>
