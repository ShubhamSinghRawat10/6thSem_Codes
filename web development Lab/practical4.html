<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Box Model Demonstration</title>

<style>
h1 {
  text-align: center;
  color: navy;
  margin: 30px;
}

.box-model-diagram {
  display: flex;
  justify-content: center;
  margin: 30px 0;
}

.margin-box {
  background-color: #fcd2b2;
  padding: 40px;
}

.border-box {
  border: 20px solid #f1f800;
  background-color: #c8e6c9;
  padding: 30px;
  position: relative;
}

.padding-box {
  background-color: #bbdefb;
  padding: 40px 60px;
}

.content-box {
  background-color: #1565c0;
  color: white;
  font-size: 16px;
  text-align: center;
  width: 150px;
  padding: 10px;
  margin: 5px;
}
</style>
</head>

<body>

<h1>CSS BOX MODEL DEMONSTRATION</h1>

<div class="box-model-diagram">

  <div class="margin-box">
    Margin
    <div class="border-box">
      Border
      <div class="padding-box">
        Padding
        <div class="content-box">
          Content
        </div>
      </div>
    </div>
  </div>

</div>

<footer align="center">
  <b>Created for CSS Box Model Demo</b>
</footer>

</body>
</html>
